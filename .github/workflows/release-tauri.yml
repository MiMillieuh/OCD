name: 'publish'

on:
  push:
    branches:
      - release

jobs:
  publish-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest'
            args: '--target aarch64-apple-darwin'
          - platform: 'macos-latest'
            args: '--target x86_64-apple-darwin'
          - platform: 'ubuntu-22.04'
            args: ''
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: install frontend dependencies
        run: yarn install

      - uses: tauri-apps/tauri-action@v0
        id: tauri-build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: app-v__VERSION__
          releaseName: 'App v__VERSION__'
          releaseBody: 'See the assets to download this version and install.'
          releaseDraft: true
          prerelase: false
          args: ${{ matrix.args }}

      # ─── REMOVE BUNDLED WAYLAND/EGL LIBS FROM APPIMAGE (Ubuntu only) ───
      - name: Strip bundled Wayland/EGL from AppImage
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          # Find the built AppImage (tauri-action puts it in src-tauri/target/release/bundle/appimage/)
          APPIMAGE=$(find src-tauri/target/release/bundle/appimage -name "*.AppImage" | head -n 1)
          if [ -z "$APPIMAGE" ]; then
            echo "No AppImage found, skipping"
            exit 0
          fi
          echo "Processing: $APPIMAGE"
          
          # Extract
          chmod +x "$APPIMAGE"
          "$APPIMAGE" --appimage-extract
          
          # Remove bundled libs to force native ones
          rm -f squashfs-root/usr/lib/libwayland-*.so*
          rm -f squashfs-root/usr/lib/libEGL*.so*
          rm -f squashfs-root/lib/libwayland-*.so*
          rm -f squashfs-root/lib/libEGL*.so*
          
          # Repack using appimagetool
          wget -q https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage -O appimagetool
          chmod +x appimagetool
          ./appimagetool --appimage-extract-and-run squashfs-root/ "$APPIMAGE"
          
          # Cleanup
          rm -rf squashfs-root/ appimagetool

      - name: Upload modified AppImage to release
        if: matrix.platform == 'ubuntu-22.04'
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.tauri-build.outputs.releaseUploadUrl }}
          asset_path: src-tauri/target/release/bundle/appimage/*.AppImage
          asset_name: OCD_${{ steps.tauri-build.outputs.appVersion }}_amd64.AppImage
          asset_content_type: application/x-executable
